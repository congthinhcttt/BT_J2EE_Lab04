<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head><title>Edit Product</title></head>
<body>
<div layout:fragment="content" class="container body-content">
    <h2>Edit Product</h2>
    <form th:action="@{/products/edit/{id}(id=${product.id})}" th:object="${product}" method="post" class="form">
        <input type="hidden" th:field="*{id}">

        <div class="form-group mb-3">
            <label>Name:</label>
            <input class="form-control" type="text" th:field="*{name}">
            <p class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
        </div>
        <div class="form-group mb-3">
            <label>Image URL:</label>
            <input class="form-control" type="text" th:field="*{image}">
        </div>
        <div class="form-group mb-3">
            <label>Price:</label>
            <input class="form-control" type="number" th:field="*{price}">
            <p class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></p>
        </div>
        <div class="form-group mb-3">
            <label>Category:</label>
            <select th:field="*{category.id}" class="form-control">
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Update Product</button>
        <a href="/products" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
