<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <h1>Danh sách sản phẩm</h1>

    <div class="mb-3">
        <a th:href="@{/products/add}" class="btn btn-primary">Create New Product</a>
        <a th:href="@{/cart}" class="btn btn-success">View Cart</a>
    </div>

    <form th:action="@{/products/search}" method="get" class="mb-3">
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">

            <div>
                <label for="key">Search:</label>
                <input type="text" id="key" name="key" th:value="${key}" class="form-control"/>
            </div>

            <div>
                <label for="categoryId">Category:</label>
                <select id="categoryId" name="categoryId" class="form-control">
                    <option value="">-- Tất cả category --</option>
                    <option th:each="c : ${categories}"
                            th:value="${c.id}"
                            th:text="${c.name}"
                            th:selected="${categoryId != null and categoryId == c.id}">
                    </option>
                </select>
            </div>

            <div>
                <label for="sort">Sort by price:</label>
                <select id="sort" name="sort" class="form-control">
                    <option value="asc" th:selected="${sort == 'asc'}">Giá tăng dần</option>
                    <option value="desc" th:selected="${sort == 'desc'}">Giá giảm dần</option>
                </select>
            </div>

            <div style="margin-top:24px;">
                <button type="submit" class="btn btn-info">Search / Filter / Sort</button>
            </div>
        </div>
    </form>

    <table class="table table-striped">
        <thead>
        <tr>
            <th scope="col">#</th>
            <th scope="col">Name</th>
            <th scope="col">Image</th>
            <th scope="col">Price</th>
            <th scope="col">Category Name</th>
            <th scope="col">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${products.content.isEmpty()}">
            <td colspan="6" class="text-center">Không có sản phẩm nào</td>
        </tr>

        <tr th:each="product : ${products.content}">
            <th scope="row" th:text="${product.id}"></th>
            <td th:text="${product.name}"></td>
            <td>
                <img th:if="${product.image != null and !#strings.isEmpty(product.image)}"
                     height="120" width="150"
                     th:src="${product.image}" alt="Product Image">
            </td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.category != null ? product.category.name : ''}"></td>
            <td>
                <a th:href="@{/products/edit/{id}(id=${product.id})}"
                   class="btn btn-secondary btn-sm">Edit</a>

                <a th:href="@{/products/delete/{id}(id=${product.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này?')">Delete</a>

                <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-warning btn-sm">Add to Cart</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <span th:text="'Trang ' + (${products.number + 1}) + ' / ' + ${products.totalPages}"></span>
    </div>

    <div class="mt-2">
        <a th:if="${products.hasPrevious()}"
           th:href="@{/products/search(page=${products.number - 1}, key=${key}, sort=${sort}, categoryId=${categoryId})}"
           class="btn btn-outline-primary btn-sm">Previous</a>

        <a th:if="${products.hasNext()}"
           th:href="@{/products/search(page=${products.number + 1}, key=${key}, sort=${sort}, categoryId=${categoryId})}"
           class="btn btn-outline-primary btn-sm">Next</a>

        <a th:if="${key == null or key == ''}"
           th:href="@{/products(page=0, sort=${sort}, categoryId=${categoryId})}"
           class="btn btn-outline-secondary btn-sm">Danh sách gốc</a>
    </div>
</div>
</body>
</html>
